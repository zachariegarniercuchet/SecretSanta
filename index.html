<div class="app-frame">
  <div id="titleBlock">
    <div class="crest">
      <svg viewBox="0 0 100 60" class="crest-svg">

      </svg>
    </div>

  </div>

  <!-- ================= SETUP ================= -->
  <div id="setup-screen">
    <label for="numPlayers">Number of players</label>
    <select id="numPlayers">
      <option value="5">5</option><option value="6">6</option><option value="7">7</option>
      <option value="8" selected>8</option><option value="9">9</option><option value="10">10</option>
    </select>

    <label for="seedInput">Seed (optional — same seed = same deal)</label>
    <input type="text" id="seedInput" placeholder="leave blank for random">

  </div>

  <!-- ================= GAME ================= -->
  <div id="game-screen" class="hidden">
    <div id="settingsBtn">⚙</div>
    <div id="settingsPanel" class="hidden">
      <div id="seedDisplay"></div>
      <div class="settings-counts">
        <div>Deck: <span id="deckCount">0</span></div>
        <div>Discard: <span id="discardCount">0</span></div>
      </div>
      <button class="secondary" id="newGameBtn">↻ New Game</button>
    </div>

    <div id="table-wrap">
      <div class="card-deck" id="drawPileBtn">
        <div class="deck-word">DRAW</div>
      </div>
      <div class="chaos-btn" id="chaosBtn">
        <div class="deck-word">CHAOS</div>
      </div>
      <div id="table-center">
        <div class="track-label">LIBERAL POLICIES</div>
        <div class="track" id="liberalTrack"></div>
        <div class="track-label">FASCIST POLICIES</div>
        <div class="track" id="fascistTrack"></div>
      </div>
      <!-- player circles injected here by JS -->
    </div>
  </div>
</div>

<!-- ================= MODAL ================= -->
<div id="modal-overlay" class="hidden">
  <div class="modal-box" id="modalContent"></div>
</div>

<!-- ================= POWER OVERLAY ================= -->
<div id="power-overlay" class="hidden">
  <div class="power-banner" id="powerBanner"></div>
</div>

<!-- ================= FULLSCREEN CONTROL (video-player style, detached UI) ================= -->
<div id="fs-control-layer">
  <button id="fsIconBtn" aria-label="Toggle fullscreen">
    <svg id="fsIconSvg" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
  </button>
</div>

<script>
/* ============ SEEDED RNG ============ */
function xmur3(str){
  let h = 1779033703 ^ str.length;
  for (let i=0;i<str.length;i++){
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = h<<13 | h>>>19;
  }
  return function(){
    h = Math.imul(h ^ h>>>16, 2246822507);
    h = Math.imul(h ^ h>>>13, 3266489909);
    h ^= h>>>16;
    return h >>> 0;
  };
}
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function makeRng(seedStr){
  const seedFn = xmur3(seedStr);
  return mulberry32(seedFn());
}
function shuffle(arr, rng){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(rng()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

/* ============ GAME CONFIG ============ */
const ROLE_TABLE = {
  5:{lib:3, fasc:1}, 6:{lib:4, fasc:1}, 7:{lib:4, fasc:2},
  8:{lib:5, fasc:2}, 9:{lib:5, fasc:3}, 10:{lib:6, fasc:3}
};
function getPowerLabels(n){
  if(n<=6) return ['', '', 'peek', 'kill', 'kill', 'victory'];
  if(n<=8) return ['', 'investigate', 'special', 'kill', 'kill', 'victory'];
  return ['investigate', 'investigate', 'special', 'kill', 'kill', 'victory'];
}
const POWER_TEXT = {
  peek:'Policy Peek', kill:'Execution', investigate:'Investigate Loyalty',
  special:'Special Election', victory:'Fascist Victory'
};

/* ============ STATE ============ */
let state = null;

function initGame(numPlayers, seedStr){
  const seed = seedStr && seedStr.trim() ? seedStr.trim() : String(Date.now());
  const rng = makeRng(seed);

  const cfg = ROLE_TABLE[numPlayers];
  let roles = [];
  for(let i=0;i<cfg.lib;i++) roles.push('liberal');
  for(let i=0;i<cfg.fasc;i++) roles.push('fascist');
  roles.push('hitler');
  shuffle(roles, rng);

  const players = [];
  for(let i=0;i<numPlayers;i++){
    players.push({
      id:i, name:null, role:roles[i],
      party: roles[i]==='liberal' ? 'liberal' : 'fascist'
    });
  }

  // Fixed physical deck: 6 liberal + 11 fascist = 17 total, always.
  let deck = [];
  for(let i=0;i<6;i++) deck.push('liberal');
  for(let i=0;i<11;i++) deck.push('fascist');
  shuffle(deck, rng);

  state = {
    seed, numPlayers, players, rng, deck, discard:[],
    liberalCount:0, fascistCount:0,
    powerLabels: getPowerLabels(numPlayers),
    legislative:null
  };
}

/* ============ CARD DRAWING (respects physical 17-card deck) ============ */
// Draws n cards one at a time. Only reshuffles the discard pile back in
// once the deck is truly empty mid-draw -- never shuffles early.
function drawCards(n){
  const result = [];
  for(let i=0;i<n;i++){
    if(state.deck.length === 0){
      if(state.discard.length === 0) break; // total conserved at 17, shouldn't happen
      state.deck = shuffle(state.discard.slice(), state.rng);
      state.discard = [];
    }
    result.push(state.deck.pop());
  }
  return result;
}
// Read-only peek at the top of the deck, no reshuffle triggered by peeking.
function peekTop(n){
  const available = Math.min(n, state.deck.length);
  return state.deck.slice(-available).reverse();
}

/* ============ RENDER ============ */
function renderAll(){
  renderPlayers();
  renderTracks();
  document.getElementById('deckCount').textContent = state.deck.length;
  document.getElementById('discardCount').textContent = state.discard.length;
  document.getElementById('seedDisplay').textContent = 'seed: ' + state.seed;
}

function renderPlayers(){
  const wrap = document.getElementById('table-wrap');
  wrap.querySelectorAll('.player-circle').forEach(el=>el.remove());
  const n = state.players.length;
  const radius = 44; // percent of table-wrap
  state.players.forEach((p,i)=>{
    const angle = (2*Math.PI*i/n) - Math.PI/2;
    const x = 50 + radius*Math.cos(angle);
    const y = 50 + radius*Math.sin(angle);
    const div = document.createElement('div');
    div.className = 'player-circle' + (p.name ? ' assigned':'');
    div.style.left = x+'%';
    div.style.top = y+'%';
    div.innerHTML = p.name
      ? `<div class="name">${p.name}</div>`
      : `<div>Seat ${p.id+1}</div>`;
    div.onclick = ()=>onPlayerClick(p.id);
    wrap.appendChild(div);
  });
}

function renderTracks(){
  const libTrack = document.getElementById('liberalTrack');
  libTrack.innerHTML = '';
  for(let i=0;i<5;i++){
    const box = document.createElement('div');
    box.className = 'box' + (i < state.liberalCount ? ' filled-liberal':'') + (i===4?' victory':'');
    box.innerHTML = i===4 ? '<img class="win-logo" src="icons/logo_liberal-removebg.png" alt="Liberal victory">' : '';
    libTrack.appendChild(box);
  }

  const fascTrack = document.getElementById('fascistTrack');
  fascTrack.innerHTML = '';
  for(let i=0;i<6;i++){
    const box = document.createElement('div');
    box.className = 'box' + (i < state.fascistCount ? ' filled-fascist':'') + (i===5?' victory':'');
    const label = state.powerLabels[i];
    if(label==='victory'){
      box.innerHTML = '<img class="win-logo" src="icons/logo_fascist-removebg.png" alt="Fascist victory">';
    } else if(label){
      box.innerHTML = `<span class="power">${POWER_TEXT[label]}</span>`;
    }
    fascTrack.appendChild(box);
  }
}

/* ============ PLAYER HEAD CLICK ============ */
function onPlayerClick(id){
  const p = state.players[id];
  if(!p.name){
    const n = window.prompt('Enter this player\'s name:');
    if(!n) return;
    p.name = n.trim();
    renderPlayers();
    openFirstRevealModal(p);
  } else {
    openPartyOnlyModal(p);
  }
}

function openFirstRevealModal(p){
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="modal-title">Hand the phone to <b>${p.name}</b></div>
    <p>Tap below to secretly reveal your Secret Role and Party Membership card.</p>
    <div class="card-big back" id="revealBtn">TAP TO<br>REVEAL</div>
  `;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('revealBtn').onclick = ()=>showRoleCards(p);
}

const ROLE_CARD_IMG = {
  hitler:  'icons/card_hitler.png',
  fascist: 'icons/card_fascist.png',
  liberal: 'icons/card_liberal.png'
};

function partyCardInner(party){
  const logo = party === 'fascist' ? 'icons/logo_fascist.png' : 'icons/logo_liberal.png';
  return `
    <div class="party-card-inner">
      <div class="party-card-header">Party<br>Membership</div>
      <img class="party-card-logo" src="${logo}" alt="${party}">
      <div class="party-card-name">${party.toUpperCase()}</div>
    </div>
  `;
}

function showRoleCards(p){
  const content = document.getElementById('modalContent');
  let roleClass = 'role-' + p.role;
  let roleInner = `<img class="role-card-img" src="${ROLE_CARD_IMG[p.role]}" alt="${p.role}">`;
  let teammateHtml = '';

  if(p.role === 'fascist'){
    const others = state.players.filter(x => x.role==='fascist' && x.id!==p.id);
    const hitler = state.players.find(x=>x.role==='hitler');
    let names = others.map(x=>x.name || 'Seat '+(x.id+1));
    names.push((hitler.name || 'Seat '+(hitler.id+1)) + ' (HITLER)');
    teammateHtml = `<div class="teammates">Your fellow fascists: ${names.join(', ')}</div>`;
  }
  if(p.role === 'hitler' && state.numPlayers <= 6){
    const fasc = state.players.find(x=>x.role==='fascist');
    teammateHtml = `<div class="teammates">Your fascist teammate: ${fasc.name || 'Seat '+(fasc.id+1)}</div>`;
  }

  content.innerHTML = `
    <div class="modal-title">${p.name}'s Role</div>
    <div class="card-row">
      <div class="card-big ${roleClass}">${roleInner}</div>
      <div class="card-big role-${p.party}">${partyCardInner(p.party)}</div>
    </div>
    ${teammateHtml}
    <button class="close-x gold" id="closeModalBtn">Done — Close</button>
  `;
  document.getElementById('closeModalBtn').onclick = closeModal;
}

function openPartyOnlyModal(p){
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="modal-title">${p.name}</div>
    <p>Click to reveal the Party Membership card.</p>
    <div class="card-big back" id="revealPartyBtn">TAP TO<br>REVEAL</div>
  `;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('revealPartyBtn').onclick = ()=>{
    content.innerHTML = `
      <div class="modal-title">${p.name}'s Party Membership</div>
      <div class="card-big role-${p.party}">${partyCardInner(p.party)}</div>
      <button class="close-x gold" id="closeModalBtn">Close</button>
    `;
    document.getElementById('closeModalBtn').onclick = closeModal;
  };
}

function closeModal(){
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modalContent').innerHTML = '';
}


/* ============ LEGISLATIVE SESSION ============ */

document.getElementById('chaosBtn').onclick = ()=>{
  if(state.legislative){ alert('Finish the current legislative session first.'); return; }
  openChaosConfirm();
};

function openChaosConfirm(){
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="modal-title">Country in Chaos</div>
    <p>Three governments have been rejected in a row. The top policy of the deck will be revealed and enacted automatically. Any Presidential Power it grants is ignored.</p>
    <div style="margin-top:16px;">
      <button class="gold" id="chaosConfirmBtn">Confirm</button>
      <button class="secondary" id="chaosDismissBtn" style="margin-left:10px;">Dismiss</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('chaosDismissBtn').onclick = closeModal;
  document.getElementById('chaosConfirmBtn').onclick = runChaosEnactment;
}

function runChaosEnactment(){
  const drawn = drawCards(1);
  if(drawn.length === 0){ alert('No policy cards remain to enact.'); closeModal(); return; }
  const type = drawn[0];

  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="modal-title">Chaos Policy Revealed</div>
    <div class="card-row">
      <div class="card-big policy-${type}">${type.toUpperCase()}</div>
    </div>
    <p class="banner-hint">Enacted automatically. Powers granted by this policy are ignored. Reset the Election Tracker and term limits at the table.</p>
    <button class="close-x gold" id="closeModalBtn">Done — Close</button>
  `;
  document.getElementById('closeModalBtn').onclick = ()=>{
    closeModal();
    finishChaosEnactment(type);
  };
}

function finishChaosEnactment(type){
  if(type === 'liberal') state.liberalCount++;
  else state.fascistCount++;
  reshuffleIfLow();
  renderAll();
  // Powers are intentionally ignored here -- only check for game-ending win conditions.
  if(state.liberalCount >= 5){
    setTimeout(()=>alert('🕊 LIBERAL VICTORY — 5 Liberal policies enacted!'), 200);
  } else if(state.fascistCount >= 6){
    setTimeout(()=>alert('🔥 FASCIST VICTORY — 6 Fascist policies enacted!'), 200);
  }
}

document.getElementById('drawPileBtn').onclick = ()=>{
  if(state.legislative){ alert('A legislative session is already in progress.'); return; }
  const three = drawCards(3);
  if(three.length < 3){ alert('Not enough policy cards remain — check the deck/discard.'); return; }
  state.legislative = { stage:'president-hidden', three, chancellorTwo:null };
  renderAll();
  openPresidentRevealModal();
};

function openPresidentRevealModal(){
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="modal-title">President only</div>
    <p>Click to reveal the top 3 policies.</p>
    <div class="card-big back" id="presRevealBtn">TAP TO<br>REVEAL</div>
  `;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('presRevealBtn').onclick = showPresidentCards;
}

function showHandoffToChancellor(){
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="modal-title">Hand the phone to the Chancellor</div>
    <div class="card-big back" id="chanRevealBtn">TAP TO<br>REVEAL</div>
  `;
  document.getElementById('chanRevealBtn').onclick = showChancellorCards;
}

// Generic interactive selector: cards idle-shake side by side; tapping a card
// glides it into a reserved slot near the confirm button. Tapping a slotted
// card sends it back to the hand. Leftover (never-selected) cards are
// discarded automatically when the confirm button is pressed.
function openLegislativeSelector(cards, neededSelect, confirmLabel, vetoAvailable, onConfirm){
  const content = document.getElementById('modalContent');
  const cardObjs = cards.map((type,i)=>({id:i, type}));
  let selected = [];

  const title = neededSelect === 2
    ? 'President: tap 2 cards to send to the Chancellor'
    : 'Chancellor: tap 1 card to enact';

  content.innerHTML = `
    <div class="modal-title">${title}</div>
    <div class="legislative-stage" id="legStage">
      ${cardObjs.map(c=>`<div class="lcard policy-${c.type} shake" data-id="${c.id}" style="animation-delay:${(c.id*0.18).toFixed(2)}s">${c.type.toUpperCase()}</div>`).join('')}
      ${Array.from({length:neededSelect}).map((_,i)=>`<div class="lslot" data-slot="${i}"></div>`).join('')}
    </div>
    <button class="gold" id="confirmLegBtn" disabled>${confirmLabel}</button>
    ${vetoAvailable ? '<button class="secondary" id="vetoBtn" style="margin-top:10px;">Propose Veto (needs President\'s consent)</button>' : ''}
  `;

  const stage = document.getElementById('legStage');
  const cardEls = {};
  cardObjs.forEach(c=>{ cardEls[c.id] = stage.querySelector(`.lcard[data-id="${c.id}"]`); });
  const slotEls = Array.from(stage.querySelectorAll('.lslot'));
  const CW = 88, CH = 122, GAP = 8;

  function layout(){
    const stageW = stage.clientWidth;
    const handIds = cardObjs.map(c=>c.id).filter(id=>!selected.includes(id));
    const handTotal = handIds.length*CW + Math.max(0,handIds.length-1)*GAP;
    const handStartX = (stageW - handTotal)/2;
    handIds.forEach((id,i)=>{
      const el = cardEls[id];
      el.style.left = (handStartX + i*(CW+GAP)) + 'px';
      el.style.top = '0px';
      el.classList.add('shake');
      el.classList.remove('settled');
    });

    const slotTotal = neededSelect*CW + Math.max(0,neededSelect-1)*GAP;
    const slotStartX = (stageW - slotTotal)/2;
    for(let i=0;i<neededSelect;i++){
      slotEls[i].style.left = (slotStartX + i*(CW+GAP)) + 'px';
      slotEls[i].style.top = '150px';
    }
    selected.forEach((id,i)=>{
      const el = cardEls[id];
      el.style.left = (slotStartX + i*(CW+GAP)) + 'px';
      el.style.top = '150px';
      el.classList.remove('shake');
      el.classList.add('settled');
    });
  }

  function updateConfirmBtn(){
    document.getElementById('confirmLegBtn').disabled = selected.length !== neededSelect;
  }

  cardObjs.forEach(c=>{
    cardEls[c.id].onclick = ()=>{
      if(selected.includes(c.id)){
        selected = selected.filter(id=>id!==c.id);
      } else {
        if(selected.length >= neededSelect) return;
        selected.push(c.id);
      }
      layout();
      updateConfirmBtn();
    };
  });

  layout();
  updateConfirmBtn();

  document.getElementById('confirmLegBtn').onclick = ()=>{
    const leftoverTypes = cardObjs.filter(c=>!selected.includes(c.id)).map(c=>c.type);
    leftoverTypes.forEach(t=>state.discard.push(t));
    const chosenTypes = selected.map(id=>cardObjs.find(c=>c.id===id).type);
    onConfirm(chosenTypes);
  };

  if(vetoAvailable){
    document.getElementById('vetoBtn').onclick = ()=>{
      const consent = window.confirm("Does the President consent to the veto? OK = Yes, Cancel = No");
      if(consent){
        cardObjs.forEach(c=>state.discard.push(c.type));
        state.legislative = null;
        closeModal();
        renderAll();
        alert('Agenda vetoed. Both policies discarded. Advance the election tracker by 1 (tracked orally).');
      } else {
        alert('The President does not consent. The Chancellor must enact one of the two policies.');
      }
    };
  }
}

function showPresidentCards(){
  openLegislativeSelector(state.legislative.three, 2, 'Send to Chancellor', false, (chosenTwo)=>{
    state.legislative.chancellorTwo = chosenTwo;
    state.legislative.stage = 'chancellor-hidden';
    renderAll();
    showHandoffToChancellor();
  });
}

function showChancellorCards(){
  const vetoAvailable = state.fascistCount >= 5;
  openLegislativeSelector(state.legislative.chancellorTwo, 1, 'Enact Law', vetoAvailable, (chosenOne)=>{
    enactPolicy(chosenOne[0]);
  });
}

function enactPolicy(type){
  if(type === 'liberal'){
    state.liberalCount++;
  } else {
    state.fascistCount++;
  }
  state.legislative = null;
  reshuffleIfLow();
  closeModal();
  renderAll();
  checkWinAndPower(type);
}

// Rule: at the end of a legislative session (or a chaos enactment), if fewer
// than 3 cards remain in the deck, shuffle the whole discard pile back in
// to form a fresh deck -- don't wait until the deck is fully empty mid-draw.
function reshuffleIfLow(){
  if(state.deck.length < 3 && state.discard.length > 0){
    state.deck = shuffle(state.deck.concat(state.discard), state.rng);
    state.discard = [];
  }
}

function checkWinAndPower(justEnacted){
  if(state.liberalCount >= 5){
    setTimeout(()=>alert('🕊 LIBERAL VICTORY — 5 Liberal policies enacted!'), 200);
    return;
  }
  if(state.fascistCount >= 6){
    setTimeout(()=>alert('🔥 FASCIST VICTORY — 6 Fascist policies enacted!'), 200);
    return;
  }
  if(justEnacted === 'fascist'){
    const idx = state.fascistCount - 1;
    const label = state.powerLabels[idx];
    if(label && label !== 'victory'){
      showPowerBanner(label);
    }
  }
}

function showPowerBanner(label){
  const banner = document.getElementById('powerBanner');
  let extra = '';
  if(label === 'peek'){
    extra = `<button id="peekBtn">Reveal top 3 cards (President only)</button>`;
  } else if(label === 'investigate'){
    extra = `<div class="banner-hint">Use a player's head-tap (Party Membership reveal) to investigate them.</div>`;
  } else if(label === 'kill' || label === 'special'){
    extra = `<div class="banner-hint">Resolve this orally at the table.</div>`;
  }
  banner.innerHTML = `
    <div class="power-title">Presidential Power Granted</div>
    <div class="power-name">${POWER_TEXT[label]}</div>
    ${extra}
    <button class="gold" id="dismissPowerBtn">Dismiss</button>
  `;
  document.getElementById('power-overlay').classList.remove('hidden');
  document.getElementById('dismissPowerBtn').onclick = closePowerBanner;
  if(label === 'peek'){
    document.getElementById('peekBtn').onclick = ()=>{
      closePowerBanner();
      openPolicyPeekModal();
    };
  }
}

function closePowerBanner(){
  document.getElementById('power-overlay').classList.add('hidden');
  document.getElementById('powerBanner').innerHTML = '';
}

/* ============ POLICY PEEK ============ */
const PEEK_ORDER_LABELS = ['First', 'Second', 'Third'];

function openPolicyPeekModal(){
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="modal-title">Policy Peek — President only</div>
    <p>Click to secretly view the top of the deck. Nothing is removed or reordered.</p>
    <div class="card-big back" id="peekRevealBtn">TAP TO<br>REVEAL</div>
  `;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('peekRevealBtn').onclick = ()=>{
    const top = peekTop(3);
    const note = top.length < 3 ? `<p class="banner-hint">Only ${top.length} card(s) remain before a reshuffle.</p>` : '';
    content.innerHTML = `
      <div class="modal-title">Top of deck, in draw order</div>
      <div class="peek-stage">
        ${top.map((c,i)=>`
          <div class="peek-card-wrap">
            <div class="lcard policy-${c} static">${c.toUpperCase()}</div>
            <div class="peek-order">${PEEK_ORDER_LABELS[i]}</div>
          </div>
        `).join('')}
      </div>
      ${note}
      <button class="close-x gold" id="closeModalBtn">Done — Close</button>
    `;
    document.getElementById('closeModalBtn').onclick = closeModal;
  };
}

/* ============ SETUP / NEW GAME ============ */
document.getElementById('playBtn').onclick = ()=>{
  const n = parseInt(document.getElementById('numPlayers').value);
  const seed = document.getElementById('seedInput').value;
  initGame(n, seed);
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('titleBlock').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  renderAll();
};

document.getElementById('newGameBtn').onclick = ()=>{
  if(!confirm('Start a brand new game? This will discard current progress.')) return;
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('titleBlock').classList.remove('hidden');
  document.getElementById('setup-screen').classList.remove('hidden');
  document.getElementById('powerBanner').innerHTML = '';
  document.getElementById('settingsPanel').classList.add('hidden');
};

document.getElementById('settingsBtn').onclick = ()=>{
  document.getElementById('settingsPanel').classList.toggle('hidden');
};

/* ============ YOUTUBE-STYLE FULLSCREEN CONTROL ============ */
const ICON_EXPAND = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
const ICON_COMPRESS = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';

function isFullscreen(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}

function updateFsIcon(){
  document.getElementById('fsIconSvg').innerHTML = isFullscreen() ? ICON_COMPRESS : ICON_EXPAND;
}

async function toggleFullscreen(){
  const el = document.documentElement;
  if(!isFullscreen()){
    if(el.requestFullscreen) await el.requestFullscreen().catch(()=>{});
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    if(screen.orientation && screen.orientation.lock){
      screen.orientation.lock('landscape').catch(()=>{}); // silently ignored where unsupported
    }
  } else {
    if(document.exitFullscreen) await document.exitFullscreen().catch(()=>{});
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    if(screen.orientation && screen.orientation.unlock){
      try{ screen.orientation.unlock(); }catch(e){}
    }
  }
}

let fsHideTimer = null;
function showFsControls(){
  if(document.getElementById('game-screen').classList.contains('hidden')) return; // only during play
  const layer = document.getElementById('fs-control-layer');
  layer.classList.add('visible');
  clearTimeout(fsHideTimer);
  fsHideTimer = setTimeout(()=>{ layer.classList.remove('visible'); }, 2500);
}

document.getElementById('fsIconBtn').onclick = (e)=>{
  e.stopPropagation();
  toggleFullscreen();
  showFsControls();
};
document.getElementById('game-screen').addEventListener('click', showFsControls);
document.addEventListener('fullscreenchange', updateFsIcon);
document.addEventListener('webkitfullscreenchange', updateFsIcon);
</script>
</body>
